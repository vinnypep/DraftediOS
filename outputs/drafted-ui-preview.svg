<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1100" viewBox="0 0 1800 1100">
  <defs>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", Arial, sans-serif; }
      .page { fill: #f5f5f6; }
      .phone { fill: #050506; stroke: #19191d; stroke-width: 10; }
      .glass { fill: #222225; stroke: rgba(255,255,255,.26); stroke-width: 1.5; }
      .glass2 { fill: #2b2b2f; stroke: rgba(255,255,255,.30); stroke-width: 1.5; }
      .white { fill: #fff; }
      .black { fill: #050506; }
      .muted { fill: #aaaab0; }
      .dim { fill: #73737a; }
      .hero { font-size: 42px; font-weight: 950; }
      .title { font-size: 30px; font-weight: 920; }
      .body { font-size: 21px; font-weight: 820; }
      .small { font-size: 16px; font-weight: 760; }
      .tiny { font-size: 13px; font-weight: 760; }
    </style>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000" flood-opacity=".24"/>
    </filter>
    <clipPath id="p1"><rect x="92" y="138" width="320" height="690" rx="52"/></clipPath>
    <clipPath id="p2"><rect x="522" y="138" width="320" height="690" rx="52"/></clipPath>
    <clipPath id="p3"><rect x="952" y="138" width="320" height="690" rx="52"/></clipPath>
    <clipPath id="p4"><rect x="1382" y="138" width="320" height="690" rx="52"/></clipPath>
  </defs>

  <rect class="page" width="1800" height="1100"/>
  <text x="90" y="78" font-size="38" font-weight="950" fill="#08080a">Drafted visual preview</text>
  <text x="90" y="112" font-size="20" font-weight="720" fill="#5e5e66">Static Codex sketch. The real SwiftUI app uses scroll views, adaptive grids, line limits, and scaling.</text>

  <g filter="url(#shadow)">
    <rect class="phone" x="78" y="124" width="348" height="718" rx="66"/>
    <rect class="phone" x="508" y="124" width="348" height="718" rx="66"/>
    <rect class="phone" x="938" y="124" width="348" height="718" rx="66"/>
    <rect class="phone" x="1368" y="124" width="348" height="718" rx="66"/>
  </g>

  <!-- Home -->
  <g clip-path="url(#p1)">
    <rect x="92" y="138" width="320" height="690" fill="#050506"/>
    <rect class="glass" x="207" y="154" width="90" height="28" rx="14"/>
    <circle class="glass" cx="140" cy="208" r="29"/>
    <text x="128" y="217" font-size="24" font-weight="900" class="white">≡</text>
    <text x="124" y="302" class="hero white">Drafted</text>

    <rect class="glass2" x="124" y="338" width="256" height="105" rx="28"/>
    <circle class="glass" cx="172" cy="390" r="32"/>
    <text x="160" y="400" font-size="28" class="white">☻</text>
    <text x="218" y="382" class="title white">Owen</text>
    <text x="218" y="411" class="small muted">Level 7 - 640 XP</text>
    <rect x="218" y="424" width="122" height="7" rx="4" fill="#444449"/>
    <rect x="218" y="424" width="86" height="7" rx="4" class="white"/>

    <rect class="glass2" x="124" y="480" width="256" height="155" rx="34"/>
    <text x="154" y="530" class="hero white">start a</text>
    <text x="154" y="584" class="hero white">new draft</text>
    <circle cx="330" cy="577" r="29" class="white"/>
    <text x="317" y="588" font-size="32" font-weight="950" class="black">→</text>

    <text x="124" y="690" class="title white">Active Drafts</text>
    <rect class="glass" x="124" y="712" width="256" height="76" rx="24"/>
    <circle class="glass" cx="164" cy="750" r="24"/>
    <text x="153" y="759" font-size="23" class="white">🏆</text>
    <text x="204" y="742" class="body white">Sports Icons</text>
    <text x="204" y="768" class="tiny muted">DRAFT-X7K9 - Round 1</text>
  </g>

  <!-- Discover -->
