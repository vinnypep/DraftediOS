    <rect x="522" y="138" width="320" height="690" fill="#050506"/>
    <rect class="glass" x="637" y="154" width="90" height="28" rx="14"/>
    <text x="554" y="252" class="hero white">choose</text>
    <text x="554" y="302" class="hero white">the room's</text>
    <text x="554" y="352" class="hero white">obsession</text>
    <rect x="554" y="390" width="105" height="38" rx="19" class="white"/>
    <text x="575" y="415" class="small black">Trending</text>
    <rect x="672" y="390" width="130" height="38" rx="19" class="glass"/>
    <text x="692" y="415" class="small white">Popular</text>

    <rect class="glass2" x="554" y="470" width="118" height="150" rx="28"/>
    <circle class="glass" cx="592" cy="512" r="27"/><text x="581" y="521" font-size="24">🏃</text>
    <text x="579" y="562" class="body white">Sports</text><text x="579" y="589" class="body white">Icons</text>
    <rect class="glass" x="690" y="470" width="118" height="150" rx="28"/>
    <circle class="glass" cx="728" cy="512" r="27"/><text x="717" y="521" font-size="24">🎬</text>
    <text x="714" y="562" class="body white">Movie</text><text x="714" y="589" class="body white">Legends</text>
    <rect class="glass" x="554" y="640" width="118" height="150" rx="28"/>
    <circle class="glass" cx="592" cy="682" r="27"/><text x="581" y="691" font-size="24">🎤</text>
    <text x="579" y="732" class="body white">Music</text><text x="579" y="759" class="body white">Moments</text>
    <rect class="glass" x="690" y="640" width="118" height="150" rx="28"/>
    <circle class="glass" cx="728" cy="682" r="27"/><text x="717" y="691" font-size="24">🎮</text>
    <text x="714" y="732" class="body white">Video</text><text x="714" y="759" class="body white">Games</text>
  </g>

  <!-- Room -->
  <g clip-path="url(#p3)">
    <rect x="952" y="138" width="320" height="690" fill="#050506"/>
    <rect class="glass" x="1067" y="154" width="90" height="28" rx="14"/>
    <rect class="glass2" x="980" y="184" width="264" height="112" rx="28"/>
    <text x="1004" y="225" class="body white">DRAFT-X7K9</text>
    <text x="1004" y="252" class="small muted">Round 1 of 3</text>
    <rect x="1164" y="210" width="62" height="28" rx="14" class="white"/>
    <text x="1178" y="229" class="tiny black">3 lives</text>
    <circle class="glass" cx="1007" cy="277" r="17"/><circle class="glass" cx="1045" cy="277" r="17"/><circle class="glass" cx="1083" cy="277" r="17"/>

    <rect class="glass2" x="980" y="326" width="264" height="100" rx="31"/>
    <circle cx="1027" cy="376" r="28" class="white"/>
    <text x="1014" y="386" font-size="25" class="black">☝</text>
    <text x="1072" y="370" class="title white">your pick</text>
    <text x="1072" y="398" class="small muted">Make it count.</text>

    <rect class="glass" x="980" y="454" width="264" height="48" rx="24"/>
    <text x="1006" y="484" class="small muted">⌕ Search picks</text>
    <text x="980" y="548" class="title white">Draft Board</text>
    <rect class="glass2" x="980" y="572" width="124" height="142" rx="27"/>
    <circle class="glass" cx="1018" cy="613" r="25"/><text x="1008" y="622" font-size="23" class="white">①</text>
    <text x="1002" y="660" class="body white">Prime</text><text x="1002" y="686" class="body white">Serena</text>
    <rect class="glass" x="1120" y="572" width="124" height="142" rx="27"/>
    <circle class="glass" cx="1158" cy="613" r="25"/><text x="1148" y="622" font-size="23" class="white">☾</text>
    <text x="1142" y="660" class="body white">Sleeper</text><text x="1142" y="686" class="body white">Aura</text>
    <rect class="glass2" x="980" y="742" width="264" height="66" rx="28"/>
    <text x="1004" y="783" class="title white">45s</text><text x="1090" y="783" font-size="25">🔥 😮 💀 👏</text>
  </g>

  <!-- Results -->
  <g clip-path="url(#p4)">
    <rect x="1382" y="138" width="320" height="690" fill="#050506"/>
    <rect class="glass" x="1497" y="154" width="90" height="28" rx="14"/>
    <text x="1414" y="228" class="small muted">THE WINNER IS</text>
    <rect class="glass2" x="1414" y="258" width="256" height="222" rx="36"/>
    <circle class="glass" cx="1465" cy="318" r="37"/><text x="1450" y="331" font-size="34" class="white">☻</text>
    <text x="1522" y="314" class="hero white">Owen</text>
    <text x="1522" y="343" class="small muted">Sports Icons</text>
    <text x="1438" y="400" class="body white">Owen wins by taste</text>
    <text x="1438" y="428" class="body white">and timing.</text>
    <text x="1438" y="456" class="tiny muted">The AI judge liked the board control.</text>
    <text x="1414" y="536" class="title white">Team Scores</text>
    <rect class="glass" x="1414" y="560" width="256" height="72" rx="25"/>
    <circle cx="1451" cy="596" r="22" class="white"/><text x="1440" y="603" class="tiny black">#1</text>
    <text x="1492" y="590" class="body white">Owen</text><text x="1492" y="615" class="tiny muted">Premium board.</text>
    <text x="1608" y="608" font-size="31" font-weight="950" class="white">92</text>
    <rect class="glass" x="1414" y="650" width="256" height="72" rx="25"/>
    <circle cx="1451" cy="686" r="22" class="white"/><text x="1440" y="693" class="tiny black">#2</text>
    <text x="1492" y="680" class="body white">Mia</text><text x="1492" y="705" class="tiny muted">One risky reach.</text>
    <text x="1608" y="698" font-size="31" font-weight="950" class="white">87</text>
    <rect x="1414" y="752" width="256" height="52" rx="26" class="white"/>
    <text x="1502" y="785" class="body black">Rematch</text>
  </g>

  <text x="90" y="930" font-size="27" font-weight="920" fill="#08080a">Overlap note</text>
  <text x="90" y="967" font-size="20" font-weight="680" fill="#555">The earlier preview overlapped because it was a quick fixed-position drawing. I tightened the real SwiftUI text/card behavior and redrew this preview with safer spacing.</text>
</svg>
