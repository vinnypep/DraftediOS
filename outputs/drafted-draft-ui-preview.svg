<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1000" viewBox="0 0 1200 1000">
  <defs>
    <style>
      .font { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", Arial, sans-serif; }
      .title { font-size: 46px; font-weight: 750; letter-spacing: 0; fill: #060608; }
      .subtitle { font-size: 22px; font-weight: 560; fill: #66666d; }
      .screenTitle { font-size: 34px; font-weight: 720; fill: #ffffff; }
      .body { font-size: 17px; font-weight: 560; fill: rgba(255,255,255,0.66); }
      .label { font-size: 14px; font-weight: 650; fill: rgba(255,255,255,0.60); }
      .small { font-size: 12px; font-weight: 650; fill: rgba(255,255,255,0.48); }
      .headline { font-size: 19px; font-weight: 680; fill: #ffffff; }
      .card { fill: #202024; stroke: rgba(255,255,255,0.16); stroke-width: 1.2; }
      .card2 { fill: #17171a; stroke: rgba(255,255,255,0.13); stroke-width: 1; }
      .pill { fill: #ffffff; }
      .darkPill { fill: rgba(255,255,255,0.08); stroke: rgba(255,255,255,0.16); stroke-width: 1; }
      .hairline { stroke: rgba(255,255,255,0.16); stroke-width: 1; fill: none; }
    </style>
    <filter id="phoneShadow" x="-30%" y="-20%" width="160%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.22"/>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#000000" flood-opacity="0.24"/>
    </filter>
  </defs>

  <rect width="1200" height="1000" fill="#f4f4f5"/>
  <text class="font title" x="110" y="90">Drafted draft UI</text>
  <text class="font subtitle" x="110" y="126">Cleaner Apple-style direction: centered titles, restrained type, glass depth, white controls.</text>

  <!-- New Draft -->
  <g transform="translate(110 170)" filter="url(#phoneShadow)">
    <rect x="0" y="0" width="332" height="720" rx="70" fill="#09090b"/>
    <rect x="14" y="14" width="304" height="692" rx="58" fill="#020203"/>
    <rect x="117" y="32" width="98" height="32" rx="16" fill="#111114" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>

    <g transform="translate(38 100)">
      <text class="font screenTitle" x="128" y="0" text-anchor="middle">New Draft</text>
      <text class="font body" x="128" y="31" text-anchor="middle">Choose the board.</text>

      <g transform="translate(0 70)">
        <rect class="pill" x="0" y="0" width="104" height="42" rx="21"/>
        <text class="font" x="52" y="27" text-anchor="middle" font-size="15" font-weight="700" fill="#050506">Trending</text>
        <rect class="darkPill" x="116" y="0" width="102" height="42" rx="21"/>
        <text class="font" x="167" y="27" text-anchor="middle" font-size="15" font-weight="650" fill="#ffffff">Popular</text>
      </g>

      <g transform="translate(0 138)">
        <rect class="card" x="0" y="0" width="120" height="150" rx="28"/>
        <circle cx="36" cy="38" r="24" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.18)"/>
        <path d="M28 39h18M37 30v18" class="hairline" stroke-linecap="round"/>
        <text class="font headline" x="18" y="88">Sports</text>
        <text class="font headline" x="18" y="113">Icons</text>
        <text class="font small" x="18" y="135">GOAT debates</text>

        <rect class="card" x="136" y="0" width="120" height="150" rx="28"/>
        <circle cx="172" cy="38" r="24" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.18)"/>
        <path d="M163 33h18M162 42h20M166 28l5 10M178 28l-5 10" class="hairline" stroke-linecap="round"/>
        <text class="font headline" x="154" y="88">Movie</text>
        <text class="font headline" x="154" y="113">Legends</text>
        <text class="font small" x="154" y="135">Scenes &amp; quotes</text>
      </g>

      <g transform="translate(0 322)" filter="url(#softShadow)">
        <rect class="card" x="0" y="0" width="256" height="170" rx="32"/>
        <circle cx="38" cy="44" r="27" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.18)"/>
        <path d="M28 49c16-17 20-19 30-27M39 52l11 13M48 31l8 7" class="hairline" stroke-linecap="round"/>
        <text class="font headline" x="80" y="42">Music Moments</text>
        <text class="font label" x="80" y="68">Anthems, albums, chaos.</text>
        <rect class="darkPill" x="32" y="92" width="82" height="38" rx="19"/>
        <text class="font" x="73" y="116" text-anchor="middle" font-size="14" font-weight="680" fill="#ffffff">3 rounds</text>
        <rect class="darkPill" x="124" y="92" width="82" height="38" rx="19"/>
        <text class="font" x="165" y="116" text-anchor="middle" font-size="14" font-weight="680" fill="#ffffff">4 players</text>
        <rect class="pill" x="32" y="140" width="192" height="48" rx="24"/>
        <text class="font" x="128" y="171" text-anchor="middle" font-size="17" font-weight="730" fill="#050506">Generate Room</text>
      </g>
    </g>
  </g>

  <!-- Draft Room -->
  <g transform="translate(570 170)" filter="url(#phoneShadow)">
    <rect x="0" y="0" width="332" height="720" rx="70" fill="#09090b"/>
    <rect x="14" y="14" width="304" height="692" rx="58" fill="#020203"/>
    <rect x="117" y="32" width="98" height="32" rx="16" fill="#111114" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>

    <g transform="translate(38 82)">
      <g>
        <rect class="card" x="0" y="0" width="256" height="126" rx="30"/>
        <text class="font" x="24" y="40" font-size="22" font-weight="720" fill="#ffffff">DRAFT-X7K9</text>
        <rect class="pill" x="170" y="28" width="66" height="36" rx="18"/>
        <text class="font" x="203" y="51" text-anchor="middle" font-size="13" font-weight="720" fill="#050506">3 lives</text>
        <text class="font label" x="24" y="70">Round 1 of 3</text>
        <g transform="translate(24 87)">
          <circle cx="12" cy="12" r="12" fill="rgba(255,255,255,0.10)" stroke="rgba(255,255,255,0.18)"/>
          <circle cx="44" cy="12" r="12" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.16)"/>
          <circle cx="76" cy="12" r="12" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.16)"/>
          <circle cx="108" cy="12" r="12" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.16)"/>
        </g>
      </g>

      <g transform="translate(0 154)">
        <rect class="card" x="0" y="0" width="256" height="104" rx="30"/>
        <circle cx="45" cy="52" r="31" fill="#ffffff"/>
        <path d="M39 52l7 7 15-18" stroke="#050506" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <text class="font" x="92" y="47" font-size="29" font-weight="730" fill="#ffffff">Your Pick</text>
        <text class="font label" x="92" y="73">Timer is live.</text>
      </g>

      <g transform="translate(0 284)">
        <rect class="darkPill" x="0" y="0" width="256" height="48" rx="24"/>
        <circle cx="30" cy="24" r="6" fill="none" stroke="rgba(255,255,255,0.55)" stroke-width="2"/>
        <line x1="35" y1="29" x2="41" y2="35" stroke="rgba(255,255,255,0.55)" stroke-width="2" stroke-linecap="round"/>
        <text class="font label" x="56" y="30">Search picks</text>
      </g>

      <text class="font screenTitle" x="0" y="380">Draft Board</text>
      <text class="font label" x="0" y="410">60 picks left</text>

      <g transform="translate(0 448)">
        <rect class="card" x="0" y="0" width="120" height="148" rx="28"/>
        <circle cx="34" cy="38" r="24" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.18)"/>
        <text class="font" x="34" y="47" text-anchor="middle" font-size="20" font-weight="730" fill="#ffffff">1</text>
        <circle cx="88" cy="38" r="20" fill="#ffffff"/>
        <path d="M82 38h12M88 32v12" stroke="#050506" stroke-width="3" stroke-linecap="round"/>
        <text class="font headline" x="20" y="88">Prime</text>
        <text class="font headline" x="20" y="113">Serena</text>

        <rect class="card" x="136" y="0" width="120" height="148" rx="28"/>
        <circle cx="170" cy="38" r="24" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.18)"/>
        <path d="M170 27c12 12 7 27-8 32 22 7 38-11 28-28-4 8-10 12-20 12z" fill="#ffffff"/>
        <text class="font headline" x="156" y="88">Sleeper</text>
        <text class="font headline" x="156" y="113">Aura</text>
      </g>

      <g transform="translate(0 620)">
        <rect class="card" x="0" y="0" width="256" height="58" rx="29"/>
        <text class="font headline" x="30" y="37">45s</text>
        <circle cx="98" cy="29" r="18" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.14)"/>
        <circle cx="146" cy="29" r="18" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.14)"/>
        <circle cx="194" cy="29" r="18" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.14)"/>
        <circle cx="226" cy="29" r="18" fill="#ffffff"/>
      </g>
    </g>
  </g>

  <text class="font" x="110" y="952" font-size="26" font-weight="750" fill="#060608">Polish pass applied to the real SwiftUI screens</text>
  <text class="font" x="110" y="982" font-size="18" font-weight="560" fill="#65656b">Centered custom titles, adaptive grids, softer glass cards, calmer weights, and safer text fitting.</text>
</svg>
